<style>
  .mode-landscape .sl-layout { flex-direction: row; }
  .mode-portrait .sl-layout { flex-direction: column; }
  .mode-landscape .sl-visual { width: 45%; }
  .mode-portrait .sl-visual { width: 100%; height: 40%; }
  .mode-landscape .sl-content { width: 55%; }
  .mode-portrait .sl-content { width: 100%; }
</style>

<section class="w-full h-full overflow-auto bg-white">
  <div class="sl-layout flex h-full">
    <!-- Left: Content -->
    <div class="sl-content flex flex-col justify-between p-12" style="background-color: {{config.brandColor.background}};">
      <!-- Top badge -->
      <div>
        <span class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-widest" style="background-color: {{config.brandColor.accent}}; color: {{config.brandColor.accentForeground}};">
          AI English Tutor
        </span>
      </div>

      <!-- Headline -->
      <div class="flex-1 flex flex-col justify-center gap-6 py-8">
        <h1 class="text-6xl font-black leading-none tracking-tight" style="color: {{config.brandColor.foreground}}; font-family: {{config.font.headingFont}}, sans-serif;">
          {{config.appName}}
        </h1>
        <p class="text-xl font-medium leading-relaxed max-w-md" style="color: {{config.brandColor.mutedForeground}}; font-family: {{config.font.textFont}}, sans-serif;">
          Your AI English tutor, available anytime. Practice speaking, get instant feedback, and grow more confident — every single day.
        </p>

        <!-- Pillars -->
        <div class="flex flex-wrap gap-2 mt-2">
          <span class="px-3 py-1 rounded-full text-sm font-medium" style="background-color: {{config.brandColor.primary}}; color: {{config.brandColor.primaryForeground}};">🎙️ Voice Conversations</span>
          <span class="px-3 py-1 rounded-full text-sm font-medium" style="background-color: {{config.brandColor.secondary}}; color: {{config.brandColor.secondaryForeground}};">📊 Instant Feedback</span>
          <span class="px-3 py-1 rounded-full text-sm font-medium" style="background-color: {{config.brandColor.accent}}; color: {{config.brandColor.accentForeground}};">🎯 Adaptive Learning</span>
        </div>
      </div>

      <!-- Attribution -->
      <div>
        <data-attribution />
      </div>
    </div>

    <!-- Right: Visual -->
    <div class="sl-visual relative flex items-center justify-center overflow-hidden" style="background: linear-gradient(135deg, {{config.brandColor.primary}} 0%, {{config.brandColor.accentForeground}} 100%);">
      <img
        src="https://api-stag.qb-deck.quantumbyte.ai/common/image-generation?prompt=Friendly%20AI%20tutor%20avatar%20on%20a%20glowing%20indigo%20background%2C%20speech%20bubbles%20with%20waveforms%2C%20modern%20clean%20language%20learning%20app%20illustration%2C%20vibrant%2C%20motivating"
        alt="SpeakFlow AI Tutor"
        class="w-full h-full object-cover"
      />
      <!-- Overlay stat card -->
      <div class="absolute bottom-8 left-8 right-8 rounded-2xl p-4" style="background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.25);">
        <p class="text-xs font-semibold uppercase tracking-widest mb-1" style="color: rgba(255,255,255,0.7);">Powered by AI</p>
        <p class="text-base font-bold" style="color: #FFFFFF;">Natural conversation • Real feedback • Real growth</p>
      </div>
    </div>
  </div>
</section>
